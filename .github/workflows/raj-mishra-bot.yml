name: RAJ MISHRA BOT (FINAL FIXED)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: raj-mishra-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 🔥 FIX: Install Chromium correctly for Ubuntu 24.04
      - name: 🌐 Install Chromium & ChromeDriver (FIXED)
        run: |
          sudo apt-get update
          
          # Install chromium and chromium-chromedriver (correct package name)
          sudo apt-get install -y chromium-browser chromium-chromedriver
          
          # Create symlinks for compatibility
          if [ -f /usr/bin/chromium-browser ] && [ ! -f /usr/bin/chromium ]; then
            sudo ln -s /usr/bin/chromium-browser /usr/bin/chromium
          fi
          
          if [ -f /usr/lib/chromium-browser/chromedriver ] && [ ! -f /usr/bin/chromedriver ]; then
            sudo ln -s /usr/lib/chromium-browser/chromedriver /usr/bin/chromedriver
          fi
          
          # Verify installation
          echo "=== Chromium Version ==="
          chromium --version || chromium-browser --version
          echo "=== ChromeDriver Version ==="
          chromedriver --version || echo "Checking alternative path..."
          which chromedriver || ls -la /usr/lib/chromium-browser/chromedriver || ls -la /usr/bin/chromedriver
          
          # Set permissions
          sudo chmod +x /usr/bin/chromium /usr/bin/chromium-browser /usr/bin/chromedriver /usr/lib/chromium-browser/chromedriver 2>/dev/null || true

      - name: 🤖 Run Bot (Infinite Loop - Single Cookie Mode)
        run: |
          echo "🚀 Starting R4J M1SHR4 Telegram Bot..."
          echo "📱 Bot will send messages exactly like main.py"
          echo "⚡ Single cookie mode - one by one messages"
          
          # Infinite loop - bot will auto-restart if crashed
          while true
          do
            python bot.py 2>&1 | tee -a bot_output.log
            echo "⚠️ Bot stopped, restarting in 5 seconds..."
            sleep 5
          done
