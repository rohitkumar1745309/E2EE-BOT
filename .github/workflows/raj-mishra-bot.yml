name: RAJ MISHRA BOT (FINAL FIXED)

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: raj-mishra-bot
  cancel-in-progress: false   # ek hi run, queue system

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install Python deps
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      # 🔥 FIX STARTS HERE
      - name: 🌐 Install Chromium (MATCHED)
        run: |
          sudo apt update
          
          # Remove old wrong drivers
          sudo rm -f /usr/bin/chromedriver || true
          
          # Install chromium + matching driver
          sudo apt install -y chromium-browser chromium-chromedriver
          
          # Fix path issue (/usr/bin/chromium error)
          if [ ! -f /usr/bin/chromium ]; then
            sudo ln -s /usr/bin/chromium-browser /usr/bin/chromium
          fi
          
          # Show versions (debug)
          chromium-browser --version
          chromedriver --version

      - name: 🤖 Run Bot (while true)
        run: |
          echo "Starting bot..."
          while true
          do
            python bot.py
            echo "Restarting in 5 sec..."
            sleep 5
          done
